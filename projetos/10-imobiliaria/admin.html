<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Admin · Lar & Co. Imóveis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/admin.css" />
</head>
<body class="admin">

<!-- ===================== LOGIN ===================== -->
<section id="login" class="login-wrap">
  <form id="loginForm" class="login-card" novalidate>
    <div class="brand">
      <span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10M9 20v-6h6v6"/></svg></span>
      Lar <b>&amp; Co.</b>
    </div>
    <p class="login-sub">Painel administrativo</p>
    <div class="field">
      <label for="user">Usuário</label>
      <input id="user" type="text" autocomplete="username" value="" />
    </div>
    <div class="field">
      <label for="pass">Senha</label>
      <input id="pass" type="password" autocomplete="current-password" value="" />
    </div>
    <p id="loginErr" class="login-err" hidden>Usuário ou senha inválidos.</p>
    <button class="btn btn--emerald btn--block" type="submit">Entrar</button>
    <p class="demo-note">Acesso demonstrativo — autenticação apenas ilustrativa.<br><b>admin / admin</b></p>
  </form>
</section>

<!-- ===================== APP ===================== -->
<section id="app" hidden>
  <header class="adm-top">
    <div class="adm-brand">
      <span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10M9 20v-6h6v6"/></svg></span>
      Lar <b>&amp; Co.</b> <span class="tag">Admin</span>
    </div>
    <div class="adm-top-actions">
      <a href="index.html" target="_blank" rel="noopener" class="adm-link">Ver site ↗</a>
      <button id="logout" class="btn btn--ghost btn--sm" type="button">Sair</button>
    </div>
  </header>
  <main id="view" class="adm-main"></main>
</section>

<div id="toast" class="toast" hidden></div>

<script src="data/imoveis.js"></script>
<script src="assets/store.js"></script>
<script src="assets/admin.js"></script>
<script src="assets/admin-export.js"></script>
</body>
</html>
